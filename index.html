<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f1ec">
<title>סטודיו גיא | Guy Zohari Nails</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="apple-touch-icon" href="logo.png">
<style>
:root{
  --bg:#f5f1ec;--surface:#fff;--surface2:#ece8e1;
  --accent:#4a7fd0;--accent-d:#3568b8;--accent-l:#7aaae8;
  --text:#1c1814;--muted:#7a7068;--border:#dbd6ce;
  --success:#3ea068;--danger:#cc3c3c;--warn:#d08030;
  --sh0:0 1px 4px rgba(0,0,0,.07),0 1px 10px rgba(0,0,0,.04);
  --sh1:0 3px 12px rgba(0,0,0,.11),0 6px 28px rgba(0,0,0,.07);
  --sh2:0 6px 24px rgba(0,0,0,.15),0 12px 48px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Segoe UI',Arial,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.screen{display:none;min-height:100vh;padding-bottom:88px}
.screen.active{display:block}
@keyframes float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
@keyframes ctaGlow{0%,100%{box-shadow:0 4px 22px rgba(74,127,208,.42),var(--sh0)}50%{box-shadow:0 6px 36px rgba(74,127,208,.68),var(--sh0)}}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.7}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── LIQUID GLASS NAV ── */
nav{position:fixed;bottom:0;left:0;right:0;height:72px;background:rgba(248,244,238,.85);backdrop-filter:blur(32px) saturate(2.2);-webkit-backdrop-filter:blur(32px) saturate(2.2);border-top:1.5px solid rgba(255,255,255,.78);box-shadow:0 -2px 28px rgba(0,0,0,.08);display:flex;justify-content:space-around;align-items:center;z-index:100}
.nav-btn{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;padding:8px 42px;touch-action:manipulation;user-select:none;-webkit-user-select:none;font-family:inherit;transition:color .2s,transform 55ms cubic-bezier(.4,0,.6,1),opacity 60ms}
.nav-btn:active{transform:scale(0.80);opacity:.68}
.nav-btn .icon{font-size:26px;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.nav-btn.active{color:var(--accent)}
.nav-btn.active .icon{transform:scale(1.15) translateY(-1px)}
.nav-dot{position:absolute;top:4px;right:6px;width:9px;height:9px;background:var(--danger);border-radius:50%;border:2px solid var(--bg);display:none;animation:dotPulse 2s ease-in-out infinite}
.nav-dot.on{display:block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 26px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;font-family:inherit;touch-action:manipulation;user-select:none;-webkit-user-select:none;box-shadow:var(--sh0);transition:transform 55ms cubic-bezier(.4,0,.6,1),box-shadow 110ms ease,opacity 60ms,filter 55ms ease,background .2s}
.btn:not(:disabled):hover:not(:active){box-shadow:var(--sh1);transform:translateY(-2px)}
.btn:active{transform:scale(0.85) translateY(1px)!important;box-shadow:0 1px 4px rgba(0,0,0,.08)!important;opacity:.76;filter:brightness(.87)}
.btn-primary{background:var(--accent);color:#fff}
.btn-hero{background:var(--accent);color:#fff;font-size:17px;padding:16px 38px;animation:ctaGlow 2.8s ease-in-out infinite}
.btn-hero:active,.btn-hero:not(:active):hover{animation:none}
.btn-wa{background:#25D366;color:#fff}
.btn-outline{background:transparent;color:var(--accent);border:2px solid var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:9px 18px;font-size:13px;border-radius:10px}
.btn-full{width:100%}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit;transition:border-color .2s,box-shadow .2s;appearance:none;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3.5px rgba(74,127,208,.16)}
.form-group textarea{resize:vertical;min-height:80px}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;margin:10px 16px;box-shadow:var(--sh0)}
.ph{background:var(--surface);padding:48px 20px 18px;text-align:center;border-bottom:1px solid var(--border);box-shadow:var(--sh0)}
.ph h1{font-size:20px;font-weight:800;color:var(--accent)}

/* ── HERO ── */
.hero{position:relative;min-height:52vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 24px 32px;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:-6px;background:url('IMG_2304.png') center/cover no-repeat;opacity:.52;filter:blur(1.5px) saturate(1.7);transform:scale(1.06)}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(245,241,236,.08) 0%,rgba(245,241,236,.38) 42%,var(--bg) 88%)}
.hero>*:not(.hero-bg):not(.hero-grad){position:relative;z-index:1}
.hero-logo{margin-bottom:18px}
.hero-logo img{width:118px;height:118px;object-fit:cover;border-radius:30px;border:2.5px solid rgba(255,255,255,.9);box-shadow:0 8px 32px rgba(74,127,208,.28),0 2px 10px rgba(0,0,0,.12);animation:float 4.5s ease-in-out infinite;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hero-title{font-size:30px;font-weight:800;letter-spacing:-.5px}
.hero-sub{font-size:14px;color:var(--muted);margin-top:5px;font-weight:500}
.hero-cta{margin-top:22px}
.act-bk{margin:10px 16px 0;padding:13px 16px;background:linear-gradient(120deg,rgba(74,127,208,.1),rgba(74,127,208,.06));border:1.5px solid rgba(74,127,208,.28);border-radius:16px;display:none;align-items:center;gap:12px;animation:fadeUp .3s ease;box-shadow:var(--sh0)}
.act-bk.on{display:flex}
.act-bk-pulse{width:9px;height:9px;background:var(--accent);border-radius:50%;flex-shrink:0;animation:dotPulse 2s ease-in-out infinite}

/* ── BADGES / TRUST ── */
.badge-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 16px 0}
.badge{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--accent);box-shadow:var(--sh0)}
.trust-block{margin:12px 16px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:18px;text-align:center;box-shadow:var(--sh0)}
.trust-block h3{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:3px}
.trust-block p{font-size:13px;color:var(--muted);line-height:1.5}
.sec-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;padding:18px 16px 8px}

/* ── SERVICE CARDS ── */
.service-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:15px 16px;margin:7px 16px;cursor:pointer;box-shadow:var(--sh0);transition:transform 55ms cubic-bezier(.4,0,.6,1),box-shadow 110ms,opacity 60ms;touch-action:manipulation;user-select:none}
.service-card:not(:active):hover{box-shadow:var(--sh1);transform:translateY(-2px)}
.service-card:active{transform:scale(0.94) translateY(1px);box-shadow:0 1px 4px rgba(0,0,0,.06);opacity:.74}
.svc-icon{font-size:28px;flex-shrink:0}
.svc-name{font-size:15px;font-weight:700}
.svc-desc{font-size:12px;color:var(--muted);margin-top:2px}
.svc-price{font-size:17px;font-weight:800;color:var(--accent);flex-shrink:0}

/* ── GALLERY ── */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin:0 16px}
.gallery-item{aspect-ratio:1/1;overflow:hidden;cursor:pointer;border-radius:16px;box-shadow:var(--sh0);transition:transform 55ms cubic-bezier(.4,0,.6,1),box-shadow 110ms,opacity 65ms;touch-action:manipulation}
.gallery-item:not(:active):hover{box-shadow:var(--sh1);transform:scale(1.025)}
.gallery-item:active{transform:scale(0.93);opacity:.73}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-item.wide{grid-column:span 2;aspect-ratio:16/7}
.gallery-item.landscape{grid-column:span 2;aspect-ratio:16/9}

/* ── SETTINGS ── */
.s-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.s-row:last-child{border-bottom:none}
.s-label{font-size:15px;font-weight:500}
.s-sub{font-size:12px;color:var(--muted);margin-top:2px}
.s-head{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.lang-btns{display:flex;gap:6px}
.lang-btn{padding:7px 16px;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:var(--sh0);transition:border-color 55ms,color 55ms,transform 55ms,opacity 60ms;touch-action:manipulation;user-select:none}
.lang-btn:active{transform:scale(0.88);opacity:.7}
.lang-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(74,127,208,.08)}

/* ── ADMIN ── */
.adm-login{display:flex;flex-direction:column;align-items:center;padding:60px 24px}
.adm-tabs{display:flex;margin:12px 16px;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--sh0)}
.adm-tab{flex:1;padding:11px 2px;text-align:center;background:var(--surface);border:none;color:var(--muted);font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,color .2s,transform 55ms;touch-action:manipulation;letter-spacing:.1px}
.adm-tab:active{transform:scale(0.93)}
.adm-tab.active{background:var(--accent);color:#fff}
.bk-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin:8px 16px;box-shadow:var(--sh0)}
.bk-item.pending{border-right:3.5px solid var(--accent)}
.bk-item.confirmed{border-right:3.5px solid var(--success)}
.bk-item.cancelled{border-right:3.5px solid var(--danger);opacity:.5}
[dir="ltr"] .bk-item.pending{border-right:1px solid var(--border);border-left:3.5px solid var(--accent)}
[dir="ltr"] .bk-item.confirmed{border-right:1px solid var(--border);border-left:3.5px solid var(--success)}
[dir="ltr"] .bk-item.cancelled{border-right:1px solid var(--border);border-left:3.5px solid var(--danger)}
.bk-meta{display:flex;justify-content:space-between;align-items:flex-start}
.bk-name{font-size:16px;font-weight:700}
.bk-lbl{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:700}
.sp{background:#e4f0d4;color:#4a7210}.sc{background:#d2f0e0;color:#186040}.sx{background:#fde0e0;color:#aa2222}
.bk-detail{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.85}
.bk-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.acct-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin:8px 16px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh0)}
.acct-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent-l),var(--accent));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.bl-item{background:var(--surface);border:1px solid var(--border);border-left:3.5px solid var(--danger);border-radius:14px;padding:13px 16px;margin:8px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh0)}
[dir="ltr"] .bl-item{border-left:3.5px solid var(--danger);border-right:1px solid var(--border)}
.wa-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px}
.wa-status.ok{background:#d2f0e0;color:#186040}
.wa-status.off{background:#f0e8d2;color:#7a5010}

/* ── MONITOR BOARD ── */
@keyframes monPulse{0%,100%{opacity:1}50%{opacity:.5}}
.monitor-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 10px 80px;direction:ltr}
.mon-col{border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.mon-col-hd{padding:10px 10px 8px;display:flex;align-items:center;justify-content:space-between;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:#fff;gap:4px}
.mon-col-hd .mon-label{flex:1;line-height:1.3}
.mon-cnt{min-width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.mon-col-body{padding:6px;flex:1;min-height:100px}
.mon-card{background:#fff;border-radius:10px;padding:10px;margin-bottom:6px;box-shadow:var(--sh1);position:relative}
.mon-card.is-today{box-shadow:0 0 0 2px var(--accent),var(--sh1)}
.mon-card.is-today::after{content:'●';position:absolute;top:6px;right:7px;font-size:7px;color:var(--accent);animation:monPulse 2s ease-in-out infinite}
.mon-time{font-size:19px;font-weight:800;letter-spacing:-.5px;line-height:1;color:var(--text)}
.mon-name{font-size:12px;font-weight:700;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mon-svc{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mon-adv{width:100%;margin-top:8px;padding:7px 4px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;touch-action:manipulation;font-family:inherit;transition:transform 55ms,opacity 60ms;letter-spacing:.1px}
.mon-adv:active{transform:scale(0.84);opacity:.65}

/* ── WA STEPS ── */
.wa-steps-card{background:linear-gradient(135deg,rgba(74,127,208,.07),rgba(74,127,208,.03));border:1.5px solid rgba(74,127,208,.2);border-radius:16px;padding:16px;margin-top:14px}
.wa-steps-title{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.wa-step{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid rgba(74,127,208,.12)}
.wa-step:last-child{border-bottom:none}
.wa-step-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.wa-step-body{flex:1}
.wa-step-txt{font-size:13px;font-weight:700;line-height:1.4;color:var(--text)}
.wa-step-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}

/* ── REGISTRATION ── */
.reg-sheet{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.48);display:flex;align-items:flex-end;transition:opacity 380ms ease;opacity:0;pointer-events:none}
.reg-sheet.open{opacity:1;pointer-events:auto}
.reg-body{background:var(--surface);border-radius:26px 26px 0 0;padding:8px 20px 48px;width:100%;transform:translateY(100%);transition:transform 380ms cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 52px rgba(0,0,0,.16)}
.reg-sheet.open .reg-body{transform:translateY(0)}
.reg-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 22px}

/* ── WIZARD ── */
.wiz-sheet{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform 380ms cubic-bezier(.4,0,.2,1)}
.wiz-sheet.open{transform:translateY(0)}
.wiz-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);box-shadow:var(--sh0)}
.wiz-icon-btn{width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform 55ms,opacity 60ms;font-family:inherit;box-shadow:var(--sh0)}
.wiz-icon-btn:active{transform:scale(0.80);opacity:.68}
.wiz-dots{display:flex;gap:6px;align-items:center}
.wiz-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all 300ms cubic-bezier(.4,0,.2,1)}
.wiz-dot.active{width:24px;border-radius:4px;background:var(--accent)}
.wiz-track-wrapper{flex:1;overflow:hidden;position:relative;direction:ltr}
.wiz-track{display:flex;height:100%;width:500%;transition:transform 340ms cubic-bezier(.4,0,.2,1);direction:ltr}
.wiz-panel{width:20%;height:100%;overflow-y:auto;padding:24px 20px 20px;flex-shrink:0}
.wiz-footer{padding:14px 20px 38px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.wiz-h{font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.wiz-sub{font-size:14px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.wiz-svc{display:flex;align-items:center;gap:16px;background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:18px;margin-bottom:10px;cursor:pointer;box-shadow:var(--sh0);transition:transform 55ms cubic-bezier(.4,0,.6,1),box-shadow 110ms,opacity 60ms;touch-action:manipulation;user-select:none}
.wiz-svc:not(:active):hover{box-shadow:var(--sh1);transform:translateY(-2px)}
.wiz-svc:active{transform:scale(0.94);opacity:.72}
.wiz-svc.sel{border-color:var(--accent);background:rgba(74,127,208,.07)}
.wiz-svc .wi{font-size:36px;flex-shrink:0}.wiz-svc .wn{font-size:17px;font-weight:700}.wiz-svc .wd{font-size:13px;color:var(--muted);margin-top:3px}.wiz-svc .wp{font-size:20px;font-weight:800;color:var(--accent);flex-shrink:0}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-month-lbl{font-size:18px;font-weight:700}
.cal-btn{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:transform 55ms,opacity 60ms;font-family:inherit;box-shadow:var(--sh0)}
.cal-btn:active{transform:scale(0.82);opacity:.68}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;direction:ltr}
.cal-dname{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0 10px}
.cal-day{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;font-size:14px;font-weight:600;background:none;border:none;color:var(--text);cursor:pointer;touch-action:manipulation;transition:transform 55ms cubic-bezier(.4,0,.6,1),opacity 60ms,background 150ms,color 150ms;line-height:1;padding:0}
.cal-day:active:not(:disabled){transform:scale(0.74);opacity:.68}
.cal-day.today{color:var(--accent);font-weight:800}
.cal-day.sel{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(74,127,208,.42)}
.cal-day:disabled{color:var(--border);cursor:default}
.bk-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:3px;left:50%;transform:translateX(-50%)}
.cal-day.sel .bk-dot{background:rgba(255,255,255,.6)}
.tg-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px}
.tg-label:first-child{margin-top:0}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.t-slot{padding:12px 6px;text-align:center;border-radius:10px;background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;touch-action:manipulation;transition:transform 55ms cubic-bezier(.4,0,.6,1),opacity 60ms,background 150ms,border-color 150ms,box-shadow 110ms;font-family:inherit;box-shadow:var(--sh0)}
.t-slot:not(:disabled):not(.sel):hover{box-shadow:var(--sh1)}
.t-slot:active:not(:disabled){transform:scale(0.83);opacity:.66}

/* ── WHATSAPP CLOUD API ── */
async function waApiSend(to,message){
  const token=state.settings.waToken,pid=state.settings.waPhoneId;
  if(!token||!pid)return false;
  const phone=String(to).replace(/\D/g,'');
  try{
    const r=await fetch(`https://graph.facebook.com/v19.0/${pid}/messages`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({messaging_product:'whatsapp',to:phone,type:'text',text:{body:message}})
    });
    const data=await r.json();
    if(data.messages&&data.messages[0]){showToast(t('toastWaSent'));return true;}
    showToast(t('toastWaFail')+(data.error?' — '+data.error.message:''));return false;
  }catch(e){showToast(t('toastWaFail'));return false;}
}
function hasWaApi(){return !!(state.settings.waToken&&state.settings.waPhoneId);}

/* ── BLACKLIST ── */
function isBlacklisted(phone){
  const p=String(phone).replace(/\D/g,'');
  return state.blacklist.some(b=>String(b.phone).replace(/\D/g,'')===p);
}
function addToBlacklist(phone,name,reason){
  const p=String(phone).replace(/\D/g,'');
  if(state.blacklist.find(b=>String(b.phone).replace(/\D/g,'')===p))return;
  state.blacklist.push({phone:p,name:name||'',reason:reason||'',addedAt:new Date().toISOString()});
  save();showToast(t('toastBanned'));
}

      <button style="background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation" data-action="forgotPwd">${t('btnForgot')}</button></div>`;
  }
}

/* ── ADMIN ── */
function renderAdmin(){
  const ids={admLoginTitle:'admLoginTitle',admPwdLbl:'admPwdLbl',admLoginBtn:'admLoginBtn',admBackBtn:'admBackBtn',admDashTitle:'admDashTitle',admLogoutBtn:'admLogout',admTabBk:'tabBk',admTabAcc:'tabAcc',admTabBl:'tabBl',admTabGal:'tabGal',admTabSet:'tabSet',fAll:'fAll',fPend:'fPend',fConf:'fConf',admUploadTitle:'admUploadTitle',admUploadLbl:'admUploadLbl',admCaptionLbl:'admCaptionLbl',admUploadBtn:'admUploadBtn',admExistingTitle:'admExistingTitle',admSetTitle:'admSetTitle',admPhoneLbl:'admPhoneLbl',admPwdChangeLbl:'admPwdChangeLbl',admSaveBtn:'admSaveBtn',admDataTitle:'admDataTitle',admExportBtn:'admExportBtn',admClearBtn:'admClearBtn',waApiTitle:'waApiTitle',waTokenLbl:'waTokenLbl',waPhoneIdLbl:'waPhoneIdLbl',waSaveBtn:'waSaveBtn',waTestBtn:'waTestBtn',blAddTitle:'blAddTitle',blPhoneLbl:'blPhoneLbl',blNameLbl:'blNameLbl',blReasonLbl:'blReasonLbl',blAddBtn:'blAddBtn',blListTitle:'blListTitle'};
  Object.entries(ids).forEach(([el,k])=>$t(el,t(k)));
  if(!adminAuthed){$('adminLogin').style.display='flex';$('adminDash').style.display='none';}
  else{$('adminLogin').style.display='none';$('adminDash').style.display='block';
    renderBkList();renderAdmAccounts();renderAdmBlacklist();renderAdmGal();
    $('settingPhone').value=state.settings.phone||'';
    $('waToken').value=state.settings.waToken||'';$('waPhoneId').value=state.settings.waPhoneId||'';
    updateWaStatus();renderWaSteps();
  }
}
function renderWaSteps(){
  const el=$('waApiNote');if(!el)return;
  const lang=state.settings.lang||'he';
  const steps=(S[lang]&&S[lang].waSteps)||S.he.waSteps;
  el.innerHTML=`<div class="wa-steps-card">
    <div class="wa-steps-title">📖 ${lang==='ru'?'Как подключить?':'איך מחברים?'}</div>
    ${steps.map(s=>`<div class="wa-step">
      <div class="wa-step-num">${s.n}</div>
      <div class="wa-step-body"><div class="wa-step-txt">${s.txt}</div><div class="wa-step-sub">${s.sub}</div></div>
    </div>`).join('')}
  </div>`;
}
function updateWaStatus(){
  const el=$('waStatusBadge');if(!el)return;
  if(hasWaApi()){el.className='wa-status ok';el.textContent='🟢 Online';}
  else{el.className='wa-status off';el.textContent='⚪ Offline';}
}
function doAdminLogin(){if($('adminPwd').value===state.settings.adminPwd){adminAuthed=true;$('adminPwd').value='';renderAdmin();}else showToast(t('toastWrongPwd'));}
function admTab(tab){
  ['Bookings','Accounts','Blacklist','Gallery','Settings'].forEach(n=>$('tab'+n).style.display=tab===n.toLowerCase()?'':'none');
  document.querySelectorAll('.adm-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  if(tab==='bookings'){if(bkView==='monitor')renderMonitor();else renderBkList();}
}
function toggleBkView(){
  bkView=bkView==='list'?'monitor':'list';
  const btn=$('viewToggleBtn');
  if(bkView==='monitor'){
    $('bookingsList').style.display='none';$('monitorBoard').style.display='';
    if(btn)btn.textContent=t('monViewList');renderMonitor();
  }else{
    $('monitorBoard').style.display='none';$('bookingsList').style.display='';
    if(btn)btn.textContent=t('monViewMon');renderBkList();
  }
}
function renderMonitor(){
  const today=new Date().toISOString().slice(0,10);
  const cols=[
    {key:'pending',label:t('monNew'),bg:'#4a7fd0',items:[]},
    {key:'confirmed',label:t('monProgress'),bg:'#d08030',items:[]},
    {key:'completed',label:t('monDone'),bg:'#3ea068',items:[]},
  ];
  [...state.bookings].filter(b=>b.status!=='cancelled').sort((a,b)=>a.time?.localeCompare(b.time)).forEach(b=>{
    const col=cols.find(c=>c.key===b.status);if(col)col.items.push(b);
  });
  const ru=state.settings.lang==='ru';
  $('monitorBoard').innerHTML=cols.map(col=>{
    const cards=col.items.map(b=>{
      const svc=state.services.find(s=>s.id===b.serviceId);
      const svcName=svc?(ru&&svc.nameRu?svc.nameRu:svc.name):'';
      const isToday=b.date===today;
      let advBtn='';
      if(col.key==='pending')advBtn=`<button class="mon-adv" style="background:rgba(74,127,208,.15);color:#3568b8" data-action="advanceBk" data-bid="${b.id}">${t('monStartBtn')}</button>`;
      if(col.key==='confirmed')advBtn=`<button class="mon-adv" style="background:rgba(62,160,104,.15);color:#2a7048" data-action="completeBk" data-bid="${b.id}">${t('monDoneBtn')}</button>`;
      return`<div class="mon-card${isToday?' is-today':''}">
        <div class="mon-time">${b.time||'—'}</div>
        <div class="mon-name">${b.name}</div>
        <div class="mon-svc">${svc?svc.icon+' ':''} ${svcName}</div>
        ${isToday?'':'<div style="font-size:10px;color:var(--muted);margin-top:3px">📅 '+b.date+'</div>'}
        ${advBtn}
      </div>`;
    }).join('');
    return`<div class="mon-col">
      <div class="mon-col-hd" style="background:${col.bg}">
        <span class="mon-label">${col.label}</span>
        <span class="mon-cnt">${col.items.length}</span>
      </div>
      <div class="mon-col-body">${cards||'<div style="padding:12px;text-align:center;color:var(--muted);font-size:12px">—</div>'}</div>
    </div>`;
  }).join('');
}
function advanceBk(id){const b=state.bookings.find(x=>x.id==id);if(b&&b.status==='pending'){b.status='confirmed';save();renderMonitor();}}
function completeBk(id){const b=state.bookings.find(x=>x.id==id);if(b&&b.status==='confirmed'){b.status='completed';save();renderMonitor();}}
function renderBkList(){
  const el=$('bookingsList');let items=[...state.bookings].reverse();
  if(bkFilter!=='all')items=items.filter(b=>b.status===bkFilter);
  if(!items.length){el.innerHTML=`<div class="empty"><div class="ei">📋</div><p>${t('emptyBk')}</p></div>`;return;}
  const sl={pending:t('stPending'),confirmed:t('stConfirmed'),cancelled:t('stCancelled'),completed:t('stCompleted')};
  const sc={pending:'sp',confirmed:'sc',cancelled:'sx',completed:'sc'};
  el.innerHTML=items.map(b=>{
    const svc=state.services.find(s=>s.id===b.serviceId);
    const blked=isBlacklisted(b.phone);
    return`<div class="bk-item ${b.status}">
      <div class="bk-meta"><div class="bk-name">${b.name}${blked?' 🚫':''}</div><div class="bk-lbl ${sc[b.status]||''}">${sl[b.status]||b.status}</div></div>
      <div class="bk-detail">📞 ${b.phone}<br>💅 ${svc?svc.icon+' '+svc.name:'—'}<br>📅 ${b.date} ${b.time}${b.notes?'<br>📝 '+b.notes:''}</div>
      <div class="bk-actions">
        ${b.status==='pending'?`<button class="btn btn-wa btn-sm" data-action="confirmWA" data-bid="${b.id}">${t('actConfirmWA')}</button>
          <button class="btn btn-ghost btn-sm" data-action="cancelBk" data-bid="${b.id}">${t('actCancel')}</button>`:''}
        ${b.status==='confirmed'?`<button class="btn btn-primary btn-sm" data-action="completeBk" data-bid="${b.id}">${t('actComplete')}</button>
          <button class="btn btn-ghost btn-sm" data-action="resendWA" data-bid="${b.id}">${t('actResend')}</button>
          <button class="btn btn-warn btn-sm" data-action="sendReminder" data-bid="${b.id}">${t('actRemind')}</button>`:''}
        ${!blked?`<button class="btn btn-danger btn-sm" data-action="banClient" data-phone="${b.phone}" data-name="${b.name}">${t('actBan')}</button>`:''}
        <button class="btn btn-ghost btn-sm" data-action="deleteBk" data-bid="${b.id}">🗑️</button>
      </div></div>`;
  }).join('');
}
async function confirmWA(id){
  const b=state.bookings.find(x=>x.id==id);if(!b)return;
  const svc=state.services.find(s=>s.id===b.serviceId);
  const lang=state.settings.lang||'he';
  const svcName=svc?(lang==='ru'&&svc.nameRu?svc.nameRu:svc.name):'';
  b.status='confirmed';save();renderBkList();
  const msg=t('confirmMsg')(b,svcName);
  if(hasWaApi()){await waApiSend(b.phone,msg);}
  else{window.open(`https://wa.me/${b.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');}
  showToast(t('toastConfirmed'));
}
async function sendReminder(id){
  const b=state.bookings.find(x=>x.id==id);if(!b)return;
  const svc=state.services.find(s=>s.id===b.serviceId);
  const lang=state.settings.lang||'he';
  const svcName=svc?(lang==='ru'&&svc.nameRu?svc.nameRu:svc.name):'';
  const msg=t('reminderMsg')(b,svcName);
  if(hasWaApi()){await waApiSend(b.phone,msg);}
  else{window.open(`https://wa.me/${b.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');}
}
function cancelBk(id){const b=state.bookings.find(x=>x.id==id);if(b){b.status='cancelled';save();renderBkList();}}
function deleteBk(id){if(!confirm(t('deleteQ')))return;state.bookings=state.bookings.filter(x=>x.id!=id);save();renderBkList();}
function banClient(phone,name){addToBlacklist(phone,name,'');state.bookings.filter(b=>b.phone===phone&&b.status==='pending').forEach(b=>b.status='cancelled');save();renderBkList();renderAdmAccounts();}
function renderAdmAccounts(){
  const el=$('accountsList');
  const map={};
  state.bookings.forEach(b=>{if(!b.phone)return;if(!map[b.phone])map[b.phone]={name:b.name,phone:b.phone,count:0,lastDate:'',active:0};map[b.phone].count++;if(!map[b.phone].lastDate||b.date>map[b.phone].lastDate)map[b.phone].lastDate=b.date;if(b.status==='pending'||b.status==='confirmed')map[b.phone].active++;});
  if(state.user&&!map[state.user.phone])map[state.user.phone]={name:state.user.name,phone:state.user.phone,count:0,lastDate:'',active:0};
  const users=Object.values(map);
  if(!users.length){el.innerHTML=`<div class="empty"><div class="ei">👤</div><p>${t('emptyAcct')}</p></div>`;return;}
  el.innerHTML=users.map(u=>{
    const initials=u.name.trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const blked=isBlacklisted(u.phone);
    return`<div class="acct-item${blked?' bk-item cancelled':''}">
      <div class="acct-av" style="${blked?'background:var(--danger)':''}">${initials||'?'}</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700">${u.name}${blked?' 🚫':''}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">📞 ${u.phone}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${u.count} תורים${u.lastDate?' · '+u.lastDate:''}</div></div>
      ${u.active>0?`<div style="background:rgba(74,127,208,.12);color:var(--accent);font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px">${u.active} פעיל</div>`:''}
      <div style="display:flex;flex-direction:column;gap:6px">
        <a href="tel:${u.phone}" class="btn btn-ghost btn-sm">📞</a>
        ${!blked?`<button class="btn btn-danger btn-sm" data-action="banClient" data-phone="${u.phone}" data-name="${u.name}">${t('actBan')}</button>`:`<button class="btn btn-ghost btn-sm" data-action="unbanClient" data-phone="${u.phone}">✓ ${t('blRemove')}</button>`}
      </div></div>`;
  }).join('');
}
function renderAdmBlacklist(){
  const el=$('blacklistItems');
  if(!state.blacklist.length){el.innerHTML=`<div class="empty"><div class="ei">✅</div><p>${t('blEmpty')}</p></div>`;return;}
  el.innerHTML=state.blacklist.map((b,i)=>`<div class="bl-item">
    <div style="font-size:24px">🚫</div>
    <div style="flex:1"><div style="font-size:15px;font-weight:700">${b.name||b.phone}</div>
      ${b.name?`<div style="font-size:13px;color:var(--muted)">📞 ${b.phone}</div>`:''}
      ${b.reason?`<div style="font-size:12px;color:var(--muted);margin-top:2px">💬 ${b.reason}</div>`:''}
      <div style="font-size:11px;color:var(--muted);margin-top:3px">${new Date(b.addedAt).toLocaleDateString()}</div>
    </div>
    <button class="btn btn-ghost btn-sm" data-action="removeBlacklist" data-idx="${i}">${t('blRemove')}</button>
  </div>`).join('');
}
function renderAdmGal(){
  const el=$('adminGalleryList');
  if(!state.gallery.length){el.innerHTML=`<div class="empty" style="padding:20px"><div class="ei">🖼️</div><p>${t('emptyGal')}</p></div>`;return;}
  el.innerHTML=state.gallery.map((img,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
    <img src="${img.src}" style="width:52px;height:52px;object-fit:cover;border-radius:10px"/>
    <div style="flex:1;font-size:13px;color:var(--muted)">${img.caption||'—'}</div>
    <button class="btn btn-danger btn-sm" data-action="deleteGallery" data-idx="${i}">🗑️</button></div>`).join('');
}
function uploadGallery(){
  const file=$('galleryUpload').files[0],cap=$('galleryCaption').value.trim();if(!file)return;
  const r=new FileReader();r.onload=e=>{state.gallery.push({src:e.target.result,caption:cap});save();renderAdmGal();renderGallery();$('galleryUpload').value='';$('galleryCaption').value='';showToast(t('toastImgAdded'));};r.readAsDataURL(file);
}
function deleteGallery(idx){state.gallery.splice(idx,1);save();renderAdmGal();renderGallery();}
function saveSettings(){
  const phone=$('settingPhone').value.trim(),pwd=$('settingPwd').value.trim();
  if(phone)state.settings.phone=phone;if(pwd)state.settings.adminPwd=pwd;
  save();$('settingPwd').value='';showToast(t('toastSaved'));
}
function saveWaApi(){
  state.settings.waToken=$('waToken').value.trim();
  state.settings.waPhoneId=$('waPhoneId').value.trim();
  save();updateWaStatus();showToast(t('toastSaved'));
}
async function testWaApi(){
  const token=state.settings.waToken,pid=state.settings.waPhoneId;
  if(!token||!pid){showToast(t('toastFill'));return;}
  try{
    const r=await fetch(`https://graph.facebook.com/v19.0/${pid}`,{headers:{'Authorization':`Bearer ${token}`}});
    const d=await r.json();
    if(d.id){showToast(t('toastWaOk'));$('waStatusBadge').className='wa-status ok';$('waStatusBadge').textContent='🟢 Online';}
    else showToast(t('toastWaFail')+(d.error?' — '+d.error.message:''));
  }catch{showToast(t('toastWaFail'));}
}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='guy-studio-backup.json';a.click();}
function clearOldBookings(){if(!confirm(t('clearQ')))return;const cut=Date.now()-30*24*60*60*1000;state.bookings=state.bookings.filter(b=>new Date(b.createdAt).getTime()>cut);save();renderBkList();}
function showForgot(){$('modalContent').innerHTML=`<h2 style="margin-bottom:14px">${t('forgotTitle')}</h2><p style="color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:20px">${t('forgotBody')}</p><a href="https://wa.me/${state.settings.phone}" class="btn btn-wa btn-full" target="_blank">📲 WhatsApp</a><br><br><button class="btn btn-ghost btn-full" data-action="closeModal">${t('back')}</button>`;$('modalBg').classList.remove('hidden');}

/* ── LOGO TAP (tap-tap…pause…tap-tap) ── */
let logoLog=[];
function onLogoTap(){
  const now=Date.now();logoLog.push(now);if(logoLog.length>4)logoLog=logoLog.slice(-4);
  if(logoLog.length===4){const[t1,t2,t3,t4]=logoLog;const p1=t2-t1,gap=t3-t2,p2=t4-t3;
    if(p1<480&&gap>380&&gap<1900&&p2<480){logoLog=[];adminAuthed=true;goTo('sAdmin');return;}}
  clearTimeout(logoLog._t);logoLog._t=setTimeout(()=>{logoLog=[];},2500);
}

/* ── UTILS ── */
function $(id){return document.getElementById(id);}
function $t(id,txt){const el=$(id);if(el&&typeof txt==='string')el.textContent=txt;}
function showToast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}

/* ── EVENTS ── */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action;
  if(a==='go'){goTo(el.dataset.screen);return;}
  switch(a){
    case 'tryBook':tryBook(null);break;
    case 'tryBookSvc':tryBook(+el.dataset.id);break;
    case 'submitReg':submitReg();break;
    case 'editProfile':showRegSheet();break;
    case 'wizNext':wizNext();break;
    case 'wizBack':wizBack();break;
    case 'wizClose':closeWizard();break;
    case 'wizSelSvc':wizData.serviceId=+el.dataset.id;document.querySelectorAll('.wiz-svc').forEach(s=>s.classList.toggle('sel',+s.dataset.id===wizData.serviceId));break;
    case 'wizSelDate':wizData.date=el.dataset.date;document.querySelectorAll('.cal-day').forEach(d=>d.classList.toggle('sel',d.dataset.date===wizData.date));break;
    case 'wizSelTime':wizData.time=el.dataset.time;document.querySelectorAll('.t-slot').forEach(s=>s.classList.toggle('sel',s.dataset.time===wizData.time));break;
    case 'calPrev':calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderWiz2();break;
    case 'calNext':calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderWiz2();break;
    case 'settingsLogin':goTo('sAdmin');break;
    case 'settingsLogout':adminAuthed=false;showToast(t('toastLoggedOut'));renderSettings();break;
    case 'goAdmin':goTo('sAdmin');break;
    case 'forgotPwd':showForgot();break;
    case 'adminLogin':doAdminLogin();break;
    case 'adminLogout':adminAuthed=false;goTo('sHome');break;
    case 'admTab':admTab(el.dataset.tab);break;
    case 'filterBk':bkFilter=el.dataset.filter;if(bkView==='list')renderBkList();else renderMonitor();break;
    case 'toggleBkView':toggleBkView();break;
    case 'advanceBk':advanceBk(el.dataset.bid);break;
    case 'completeBk':completeBk(el.dataset.bid);renderBkList();break;
    case 'confirmWA':confirmWA(el.dataset.bid);break;
    case 'resendWA':confirmWA(el.dataset.bid);break;
    case 'sendReminder':sendReminder(el.dataset.bid);break;
    case 'cancelBk':cancelBk(el.dataset.bid);break;
    case 'deleteBk':deleteBk(el.dataset.bid);break;
    case 'banClient':banClient(el.dataset.phone,el.dataset.name);break;
    case 'unbanClient':{const p=String(el.dataset.phone).replace(/\D/g,'');const idx=state.blacklist.findIndex(b=>String(b.phone).replace(/\D/g,'')===p);if(idx>=0)removeFromBlacklist(idx);renderAdmAccounts();}break;
    case 'addBlacklist':{const p=$('blPhone').value.trim(),n=$('blName').value.trim(),r=$('blReason').value.trim();if(!p){showToast(t('toastFill'));return;}addToBlacklist(p,n,r);$('blPhone').value='';$('blName').value='';$('blReason').value='';renderAdmBlacklist();}break;
    case 'removeBlacklist':removeFromBlacklist(+el.dataset.idx);break;
    case 'uploadGallery':uploadGallery();break;
    case 'deleteGallery':deleteGallery(+el.dataset.idx);break;
    case 'saveSettings':saveSettings();break;
    case 'saveWaApi':saveWaApi();break;
    case 'testWaApi':testWaApi();break;
    case 'exportData':exportData();break;
    case 'clearBookings':clearOldBookings();break;
    case 'closeModal':$('modalBg').classList.add('hidden');break;
  }
});
document.addEventListener('click',e=>{if(e.target.closest('#logoImg'))onLogoTap();});
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-lang]');if(!b)return;setLang(b.dataset.lang);
  const ac=document.querySelector('.screen.active');
  if(ac.id==='sHome')renderHome();if(ac.id==='sSettings')renderSettings();if(ac.id==='sAdmin')renderAdmin();
});
$('adminPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
$('modalBg').addEventListener('click',e=>{if(e.target===$('modalBg'))$('modalBg').classList.add('hidden');});
document.addEventListener('touchstart',e=>{
  if(navigator.vibrate&&e.target.closest('.btn,.service-card,.wiz-svc,.cal-day:not(:disabled),.t-slot:not(:disabled),.nav-btn,.wiz-icon-btn,.lang-btn,.gallery-item'))
    navigator.vibrate(6);
},{passive:true});

/* ── INIT ── */
setLang(state.settings.lang||'he');
goTo('sHome');
</script>
</body>
</html>
